# Run tests on every push and pull request to main.
name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Config for non-interactive install
        run: cp config.example.json config.json

      - name: Install (backend + frontend)
        run: ./install.sh

      - name: Install backend dev dependencies
        run: .venv/bin/pip install -r backend/requirements-dev.txt

      - name: Run backend tests
        run: PYTHONPATH=backend .venv/bin/python -m pytest backend/tests -v

      - name: Lint and build frontend
        run: |
          cd frontend
          npm ci
          npm run lint
          npm run build
